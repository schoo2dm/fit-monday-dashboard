<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F.I.T. MJC — Monday Briefing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0F0F0F;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .logo-img { height: 120px; width: auto; margin-bottom: 8px; display: block; }
    .logo-fit { font-size: 48px; font-weight: 900; color: #CC0000; letter-spacing: 6px; margin-bottom: 6px; }
    .logo-sub { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px; }
    .divider { width: 40px; height: 3px; background: #CC0000; margin: 20px auto; border-radius: 2px; }
    h1 { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 32px; text-align: center; }
    .clinic-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 540px;
      width: 100%;
    }
    @media (max-width: 500px) { .clinic-grid { grid-template-columns: repeat(2, 1fr); } }
    .clinic-btn {
      display: block;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 16px 12px;
      text-align: center;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s, border-color 0.15s;
    }
    .clinic-btn:hover {
      background: #CC0000;
      border-color: #CC0000;
    }
    .footer { margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.2); text-align: center; }
  </style>
</head>
<body>
  <img src="FIT Logo.png" alt="F.I.T. Muscle &amp; Joint Clinic" class="logo-img"
       onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
  <div id="logoFallback" style="display:none; text-align:center;">
    <div class="logo-fit">F.I.T.</div>
    <div class="logo-sub">Muscle &amp; Joint Clinic</div>
  </div>
  <div class="divider"></div>
  <h1>Monday Dashboard — Select Your Clinic</h1>

  <div class="clinic-grid">
    <a class="clinic-btn" href="dashboard.html?clinic=Blue+Valley">Blue Valley</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Crossroads">Crossroads</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Iowa">Iowa</a>
    <a class="clinic-btn" href="dashboard.html?clinic=KCK">KCK</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Leawood">Leawood</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Lees+Summit">Lees Summit</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Liberty">Liberty</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Olathe">Olathe</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Overland+Park">Overland Park</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Paola">Paola</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Raymore">Raymore</a>
    <a class="clinic-btn" href="dashboard.html?clinic=Shawnee">Shawnee</a>
  </div>

  <div class="footer">F.I.T. Muscle &amp; Joint Clinic &nbsp;·&nbsp; Auto-generated Monday Briefing</div>
</body>
</html>
